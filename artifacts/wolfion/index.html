<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="format-detection" content="telephone=no" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0a0a0a" media="(prefers-color-scheme: dark)" />
    <title>Wolfion</title>
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/favicon-192.png" />
    <link rel="icon" type="image/jpeg" href="/app-icon.jpg" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" sizes="192x192" href="/favicon-192.png" />
    <link rel="apple-touch-icon" href="/app-icon.jpg" />
    <meta name="application-name" content="Wolfion" />
    <meta name="apple-mobile-web-app-title" content="Wolfion" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
      // Apply the saved theme (or system preference) BEFORE React mounts so
      // the very first paint matches the user's phone — no light flash on a
      // dark phone, no dark flash on a light phone. Mirrors the logic in
      // src/hooks/use-theme.ts; if you change one, change the other.
      (function () {
        try {
          var stored = null;
          try { stored = localStorage.getItem("wolfion_theme"); } catch (e) {}
          var pref = (stored === "light" || stored === "dark" || stored === "system") ? stored : "system";
          var prefersDark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
          var isDark = pref === "dark" || (pref === "system" && prefersDark);
          var root = document.documentElement;
          if (isDark) root.classList.add("dark"); else root.classList.remove("dark");
          root.style.colorScheme = isDark ? "dark" : "light";
          root.style.background = isDark ? "#0a0a0a" : "#ffffff";
          // Also flip the Android status-bar color in real time when running
          // in TWA / browser, because the `media` queries on theme-color metas
          // only respond to OS, not to the in-app override the user picked.
          var metaLight = document.querySelector('meta[name="theme-color"][media*="light"]');
          var metaDark = document.querySelector('meta[name="theme-color"][media*="dark"]');
          if (metaLight) metaLight.setAttribute("content", isDark ? "#0a0a0a" : "#ffffff");
          if (metaDark) metaDark.setAttribute("content", isDark ? "#0a0a0a" : "#ffffff");
        } catch (e) { /* ignore — purely best-effort */ }
      })();
    </script>
    <style>
      html, body { margin: 0; padding: 0; }
      html { background: #ffffff; }
      html.dark { background: #0a0a0a; }
      html.dark body { background: #0a0a0a; color: #f5f5f5; }
      #wolfion-splash {
        position: fixed;
        inset: 0;
        z-index: 99999;
        background: #0c4f55 url("/splash.jpg") center / cover no-repeat;
        display: flex;
        align-items: flex-end;
        justify-content: center;
        padding-bottom: 18vh;
        opacity: 1;
        transition: opacity 420ms ease;
        pointer-events: auto;
      }
      #wolfion-splash.is-hidden {
        opacity: 0;
        pointer-events: none;
      }
      #wolfion-splash .ws-dots {
        display: inline-flex;
        gap: 8px;
      }
      #wolfion-splash .ws-dots span {
        width: 8px;
        height: 8px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.85);
        animation: ws-bounce 1.1s ease-in-out infinite;
        box-shadow: 0 0 12px rgba(0, 0, 0, 0.25);
      }
      #wolfion-splash .ws-dots span:nth-child(2) { animation-delay: 0.18s; }
      #wolfion-splash .ws-dots span:nth-child(3) { animation-delay: 0.36s; }
      @keyframes ws-bounce {
        0%, 80%, 100% { transform: translateY(0); opacity: 0.5; }
        40% { transform: translateY(-8px); opacity: 1; }
      }
      @media (prefers-reduced-motion: reduce) {
        #wolfion-splash .ws-dots span { animation: none; opacity: 0.85; }
        #wolfion-splash { transition: none; }
      }
    </style>
    <script>
      // Only show the marble splash inside the native Android/iOS app.
      // The browser/web version loads straight into the app.
      (function () {
        var isNative = !!(window.Capacitor && window.Capacitor.isNativePlatform && window.Capacitor.isNativePlatform());
        if (!isNative) return;
        var splash = document.createElement("div");
        splash.id = "wolfion-splash";
        splash.setAttribute("aria-hidden", "true");
        splash.innerHTML = '<div class="ws-dots" aria-label="Loading"><span></span><span></span><span></span></div>';
        document.documentElement.appendChild(splash);
        var MIN_VISIBLE_MS = 600;
        var shownAt = Date.now();
        function hide() {
          var el = document.getElementById("wolfion-splash");
          if (!el) return;
          var elapsed = Date.now() - shownAt;
          var wait = Math.max(0, MIN_VISIBLE_MS - elapsed);
          setTimeout(function () {
            el.classList.add("is-hidden");
            setTimeout(function () { el.parentNode && el.parentNode.removeChild(el); }, 500);
          }, wait);
        }
        window.__wolfionHideSplash = hide;
        setTimeout(hide, 8000);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Service worker registration. We also force a one-time reload when a
      // brand-new worker takes control of the page so users escape any
      // previously cached (and now-fixed) stale API responses without having
      // to manually hard-refresh.
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", async () => {
          try {
            const reg = await navigator.serviceWorker.register("/sw.js");
            // Ask the browser to re-check sw.js so a new version installs ASAP.
            reg.update().catch(() => undefined);
          } catch {
            /* ignore — SW is a progressive enhancement */
          }
          let reloaded = false;
          navigator.serviceWorker.addEventListener("controllerchange", () => {
            if (reloaded) return;
            reloaded = true;
            window.location.reload();
          });
        });
      }
    </script>
  </body>
</html>
