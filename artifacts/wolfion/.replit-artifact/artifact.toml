kind = "web"
previewPath = "/"
title = "Wolfion"
version = "1.0.0"
id = "artifacts/wolfion"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20497

[services.development]
run = "pnpm --filter @workspace/wolfion run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/wolfion", "run", "build" ]
publicDir = "artifacts/wolfion/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20497"
BASE_PATH = "/"
