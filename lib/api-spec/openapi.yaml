openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: ai
    description: AI-powered study assistant operations
  - name: products
    description: Wolfion shop product catalog operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /ai/chat:
    post:
      operationId: aiChat
      tags: [ai]
      summary: General study assistant chat
      description: Sends a single user message to the study assistant and returns the assistant's reply.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AiChatRequest"
      responses:
        "200":
          description: Assistant reply
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiChatReply"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiError"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiError"
  /ai/summarize-text:
    post:
      operationId: aiSummarizeText
      tags: [ai]
      summary: Summarize raw text
      description: Returns a structured summary of the provided text with main topic, key points and a simple explanation.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AiSummarizeTextRequest"
      responses:
        "200":
          description: Summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiSummaryResponse"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiError"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiError"
  /ai/summarize-url:
    post:
      operationId: aiSummarizeUrl
      tags: [ai]
      summary: Summarize an article from a URL
      description: Fetches the page at the given URL, extracts text content, and returns a structured summary.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AiSummarizeUrlRequest"
      responses:
        "200":
          description: Summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiSummaryResponse"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiError"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiError"
  /ai/summarize-video:
    post:
      operationId: aiSummarizeVideo
      tags: [ai]
      summary: Summarize a lecture or video transcript
      description: Returns a structured summary of a lecture or video transcript with main topic, key insights, important points, and a short summary.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AiSummarizeVideoRequest"
      responses:
        "200":
          description: Summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiSummaryResponse"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiError"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiError"
  /ai/transcribe:
    post:
      operationId: aiTranscribe
      tags: [ai]
      summary: Transcribe audio to text
      description: Transcribes a base64-encoded audio recording to text using OpenAI's transcription model.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AiTranscribeRequest"
      responses:
        "200":
          description: Transcribed text
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiTranscriptionResult"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiError"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiError"
  /ai/summarize-pdf:
    post:
      operationId: aiSummarizePdf
      tags: [ai]
      summary: Summarize a PDF document
      description: Extracts text from a base64-encoded PDF and returns a structured summary.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AiSummarizePdfRequest"
      responses:
        "200":
          description: Summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiPdfSummaryResponse"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiError"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiError"
  /products:
    get:
      operationId: listProducts
      tags: [products]
      summary: List all products
      description: Returns the full product catalog ordered by sortOrder then creation date. Public — no auth required.
      responses:
        "200":
          description: Product list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiError"
    post:
      operationId: createProduct
      tags: [products]
      summary: Create a new product (admin only)
      description: Inserts a new product into the catalog. Requires an admin Clerk session.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductInput"
      responses:
        "201":
          description: Created product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "400":
          description: Invalid product payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiError"
        "401":
          description: Not signed in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiError"
        "403":
          description: Not an admin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiError"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiError"
  /products/{id}:
    patch:
      operationId: updateProduct
      tags: [products]
      summary: Update an existing product (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductInput"
      responses:
        "200":
          description: Updated product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "400":
          description: Invalid product payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiError"
        "401":
          description: Not signed in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiError"
        "403":
          description: Not an admin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiError"
        "404":
          description: Product not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiError"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiError"
    delete:
      operationId: deleteProduct
      tags: [products]
      summary: Delete a product (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Product deleted
        "401":
          description: Not signed in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiError"
        "403":
          description: Not an admin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiError"
        "404":
          description: Product not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiError"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiError"
  /ai/translate:
    post:
      operationId: aiTranslate
      tags: [ai]
      summary: Translate text into a target language
      description: Translates text into the requested target language.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AiTranslateRequest"
      responses:
        "200":
          description: Translation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiTranslationResult"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiError"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiError"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    AiError:
      type: object
      properties:
        error:
          type: string
      required:
        - error
    AiChatRequest:
      type: object
      properties:
        message:
          type: string
          minLength: 1
          maxLength: 8000
      required:
        - message
    AiChatReply:
      type: object
      properties:
        reply:
          type: string
      required:
        - reply
    AiSummarizeTextRequest:
      type: object
      properties:
        text:
          type: string
          minLength: 1
          maxLength: 60000
      required:
        - text
    AiSummarizeUrlRequest:
      type: object
      properties:
        url:
          type: string
          format: uri
          minLength: 8
          maxLength: 2048
      required:
        - url
    AiSummarizeVideoRequest:
      type: object
      properties:
        transcript:
          type: string
          minLength: 1
          maxLength: 60000
      required:
        - transcript
    AiSummaryResponse:
      type: object
      properties:
        summary:
          type: string
      required:
        - summary
    AiTranslateRequest:
      type: object
      properties:
        text:
          type: string
          minLength: 1
          maxLength: 8000
        targetLanguage:
          type: string
          minLength: 1
          maxLength: 64
      required:
        - text
        - targetLanguage
    AiTranslationResult:
      type: object
      properties:
        translation:
          type: string
      required:
        - translation
    AiTranscribeRequest:
      type: object
      properties:
        audioBase64:
          type: string
          minLength: 1
          description: Base64-encoded audio bytes (no data URL prefix).
        format:
          type: string
          enum: [wav, mp3, m4a, webm, ogg, aac, flac, mp4]
          description: Hint of the audio container format.
      required:
        - audioBase64
    AiTranscriptionResult:
      type: object
      properties:
        text:
          type: string
      required:
        - text
    AiSummarizePdfRequest:
      type: object
      properties:
        pdfBase64:
          type: string
          minLength: 1
          description: Base64-encoded PDF bytes (no data URL prefix).
        filename:
          type: string
          maxLength: 256
          description: Optional original filename for context.
      required:
        - pdfBase64
    AiPdfSummaryResponse:
      type: object
      properties:
        summary:
          type: string
        pageCount:
          type: integer
          minimum: 0
        characterCount:
          type: integer
          minimum: 0
      required:
        - summary
        - pageCount
        - characterCount
    Product:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        price:
          type: number
        color:
          type: string
        category:
          type: string
          enum: [short, ankle, kids, others]
        sizes:
          type: array
          items:
            type: string
        description:
          type: string
        inventory:
          type: integer
          minimum: 0
        image:
          type: string
        video:
          type: string
          description: Optional URL to a product video (mp4/webm or any browser-playable source). Empty string means no video.
        sortOrder:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - price
        - color
        - category
        - sizes
        - description
        - inventory
        - image
        - video
        - sortOrder
        - createdAt
        - updatedAt
    ProductInput:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 200
        price:
          type: number
          minimum: 0
        color:
          type: string
          minLength: 1
          maxLength: 100
        category:
          type: string
          enum: [short, ankle, kids, others]
        sizes:
          type: array
          items:
            type: string
            minLength: 1
            maxLength: 20
          maxItems: 30
        description:
          type: string
          maxLength: 4000
        inventory:
          type: integer
          minimum: 0
        image:
          type: string
          maxLength: 8192
        video:
          type: string
          maxLength: 8192
          description: Optional URL to a product video. Pass an empty string for no video.
        sortOrder:
          type: integer
      required:
        - name
        - price
        - color
        - category
        - sizes
        - description
        - inventory
        - image
